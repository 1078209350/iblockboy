spring:
  # 生产环境：连接远程 MySQL
  # 敏感信息通过环境变量注入，避免明文提交到仓库
  # 启动前需设置：export DB_URL=... DB_USERNAME=... DB_PASSWORD=...
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://121.37.190.193:3306/gtProject?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  # 生产环境关闭热部署
  devtools:
    restart:
      enabled: false
