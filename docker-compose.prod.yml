services:
  mysql:
    image: mysql:8.0
    container_name: iblackboy-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gtStore}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - iblackboy-mysql-data:/var/lib/mysql
    networks:
      - iblackboy-net
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$$MYSQL_ROOT_PASSWORD\" mysqladmin ping -h 127.0.0.1 -uroot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    image: ${BACKEND_IMAGE}
    container_name: iblackboy-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-gtStore}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JAVA_OPTS: ${JAVA_OPTS:-}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:8000:8000"
    expose:
      - "8000"
    networks:
      iblackboy-net:
        aliases:
          - backend

volumes:
  iblackboy-mysql-data:
    name: iblackboy-mysql-data

networks:
  iblackboy-net:
    external: true
